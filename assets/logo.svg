<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="edge1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <!-- Glow halos behind nodes -->
  <circle cx="100" cy="88" r="22" fill="#6366F1" opacity="0.18" filter="url(#blur)"/>
  <circle cx="55"  cy="62" r="13" fill="#818CF8" opacity="0.15" filter="url(#blur)"/>
  <circle cx="148" cy="68" r="13" fill="#A78BFA" opacity="0.15" filter="url(#blur)"/>
  <circle cx="62"  cy="126" r="13" fill="#818CF8" opacity="0.15" filter="url(#blur)"/>
  <circle cx="143" cy="122" r="13" fill="#A78BFA" opacity="0.15" filter="url(#blur)"/>

  <!-- Edges -->
  <line x1="100" y1="88" x2="55"  y2="62"  stroke="url(#edge1)" stroke-width="2.2" opacity="0.7"/>
  <line x1="100" y1="88" x2="148" y2="68"  stroke="url(#edge1)" stroke-width="2.2" opacity="0.7"/>
  <line x1="100" y1="88" x2="62"  y2="126" stroke="url(#edge1)" stroke-width="2.2" opacity="0.7"/>
  <line x1="100" y1="88" x2="143" y2="122" stroke="url(#edge1)" stroke-width="2.2" opacity="0.7"/>
  <line x1="55"  y1="62" x2="148" y2="68"  stroke="#6366F1" stroke-width="1.2" opacity="0.3"/>
  <line x1="62"  y1="126" x2="143" y2="122" stroke="#6366F1" stroke-width="1.2" opacity="0.3"/>
  <line x1="55"  y1="62"  x2="62"  y2="126" stroke="#818CF8" stroke-width="1"   opacity="0.2"/>
  <line x1="148" y1="68"  x2="143" y2="122" stroke="#A78BFA" stroke-width="1"   opacity="0.2"/>

  <!-- Peripheral nodes -->
  <circle cx="55"  cy="62"  r="9"  fill="#818CF8" opacity="0.85"/>
  <circle cx="148" cy="68"  r="9"  fill="#A78BFA" opacity="0.85"/>
  <circle cx="62"  cy="126" r="9"  fill="#818CF8" opacity="0.85"/>
  <circle cx="143" cy="122" r="9"  fill="#A78BFA" opacity="0.85"/>

  <!-- Central node -->
  <circle cx="100" cy="88" r="16" fill="url(#glow)"/>
  <circle cx="100" cy="88" r="10" fill="white" opacity="0.15"/>

  <!-- Wordmark -->
  <text x="100" y="163"
        font-family="'Segoe UI', 'Inter', system-ui, sans-serif"
        font-size="22" font-weight="700" fill="white"
        text-anchor="middle" letter-spacing="2">AcadVex</text>

  <!-- Tagline -->
  <text x="100" y="181"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9" font-weight="400" fill="#818CF8"
        text-anchor="middle" letter-spacing="1.5">ACADEMIC · AI · AGENT</text>
</svg>
