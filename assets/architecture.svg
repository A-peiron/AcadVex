<svg width="960" height="610" viewBox="0 0 960 610" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#64748B"/>
    </marker>
    <marker id="arr-w" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#818CF8"/>
    </marker>
    <linearGradient id="fe-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="be-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <linearGradient id="sk-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#9333EA"/>
    </linearGradient>
    <linearGradient id="nd-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="tl-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369A1"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>
    <linearGradient id="dt-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94A3B8" flood-opacity="0.22"/>
    </filter>
    <filter id="sh2">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="610" fill="#F1F5F9"/>

  <!-- ═══ USER ═══ -->
  <circle cx="480" cy="32" r="20" fill="#6366F1" filter="url(#sh2)"/>
  <circle cx="480" cy="26" r="6" fill="white" opacity="0.9"/>
  <path d="M468,46 Q468,37 480,37 Q492,37 492,46" fill="white" opacity="0.9"/>
  <text x="480" y="63" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#475569">User</text>
  <line x1="480" y1="67" x2="480" y2="79" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ FRONTEND ═══ -->
  <rect x="160" y="81" width="640" height="48" rx="8" fill="url(#fe-g)" filter="url(#sh)"/>
  <text x="480" y="100" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Frontend</text>
  <text x="480" y="118" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#DDD6FE">
    React · TypeScript · Vite · shadcn/ui · ECharts · SSE EventSource
  </text>
  <line x1="480" y1="129" x2="480" y2="141" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ BACKEND ═══ -->
  <rect x="160" y="143" width="640" height="48" rx="8" fill="url(#be-g)" filter="url(#sh)"/>
  <text x="480" y="162" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Backend</text>
  <text x="480" y="180" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#BFDBFE">
    FastAPI · Pydantic v2 · Security Middleware · Async SSE Streaming
  </text>
  <line x1="480" y1="191" x2="480" y2="203" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ AGENT container ═══ -->
  <rect x="40" y="205" width="880" height="162" rx="10" fill="#0F172A" stroke="#1E293B" stroke-width="1.5" filter="url(#sh)"/>
  <text x="60" y="222" font-family="'Segoe UI',system-ui,sans-serif" font-size="8.5" font-weight="700"
        fill="#475569" letter-spacing="2">AGENT  ·  LangGraph  ·  SqliteSaver</text>

  <!-- Skill Router -->
  <rect x="60" y="230" width="168" height="54" rx="7" fill="url(#sk-g)" filter="url(#sh2)"/>
  <text x="144" y="249" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="white">Skill Router</text>
  <text x="144" y="264" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8.5" fill="#F3E8FF">intent detection</text>
  <text x="144" y="277" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#D8B4FE">tool whitelist per skill</text>

  <!-- Arrow Skill Router → LLM Node -->
  <line x1="228" y1="257" x2="278" y2="257" stroke="#818CF8" stroke-width="1.4" marker-end="url(#arr-w)"/>

  <!-- LLM Node -->
  <rect x="280" y="230" width="168" height="54" rx="7" fill="url(#nd-g)" filter="url(#sh2)"/>
  <text x="364" y="249" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="white">LLM Node</text>
  <text x="364" y="264" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8.5" fill="#C7D2FE">DeepSeek V3</text>
  <text x="364" y="277" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#A5B4FC">reason · plan · stream</text>

  <!-- Arrow LLM Node → Tool Node -->
  <line x1="448" y1="257" x2="498" y2="257" stroke="#818CF8" stroke-width="1.4" marker-end="url(#arr-w)"/>

  <!-- Tool Node -->
  <rect x="500" y="230" width="168" height="54" rx="7" fill="url(#nd-g)" filter="url(#sh2)"/>
  <text x="584" y="249" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="white">Tool Node</text>
  <text x="584" y="264" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8.5" fill="#C7D2FE">parallel dispatch</text>
  <text x="584" y="277" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#A5B4FC">concurrent execution</text>

  <!-- Return loop: Tool Node → LLM Node (U-curve below) -->
  <path d="M584,284 C584,330 364,330 364,284"
        fill="none" stroke="#6366F1" stroke-width="1.3" stroke-dasharray="5,3"
        marker-end="url(#arr-w)"/>
  <text x="474" y="343" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#6366F1" opacity="0.8">tool results</text>

  <!-- Observability box (right side of agent) -->
  <rect x="690" y="230" width="214" height="54" rx="7" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <line x1="797" y1="232" x2="797" y2="282" stroke="#334155" stroke-width="1"/>
  <text x="744" y="249" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700" fill="#93C5FD">SQLite</text>
  <text x="744" y="262" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#60A5FA">Memory · checkpoint</text>
  <text x="744" y="273" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7" fill="#3B82F6" opacity="0.7">cross-session prefs</text>
  <text x="851" y="249" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700" fill="#FCD34D">Langfuse</text>
  <text x="851" y="262" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#FDE68A">Traces · tokens</text>
  <text x="851" y="273" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7" fill="#F59E0B" opacity="0.7">latency · tool calls</text>
  <!-- Dashed connection from Tool area to obs box -->
  <line x1="668" y1="257" x2="690" y2="257" stroke="#334155" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ═══ FAN-OUT: Agent → 5 Tools ═══ -->
  <!-- Vertical from agent bottom center (480, 367) -->
  <line x1="480" y1="367" x2="480" y2="380" stroke="#64748B" stroke-width="1.4"/>
  <!-- Horizontal bar x=96 to x=864 -->
  <line x1="96" y1="380" x2="864" y2="380" stroke="#64748B" stroke-width="1.4"/>
  <!-- Five vertical drops: centers at 96, 240, 480, 672, 864 -->
  <line x1="96"  y1="380" x2="96"  y2="392" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="240" y1="380" x2="240" y2="392" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="480" y1="380" x2="480" y2="392" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="672" y1="380" x2="672" y2="392" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="864" y1="380" x2="864" y2="392" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ═══ TOOLS (5 boxes) ═══ -->
  <!-- Centers: 96, 240, 480, 672, 864 → each w=144, so x=center-72 -->

  <!-- T1: predict_collaboration (x=24..168) -->
  <rect x="24" y="394" width="144" height="54" rx="7" fill="url(#tl-g)" filter="url(#sh2)"/>
  <text x="96" y="412" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700" fill="white">predict_collaboration</text>
  <text x="96" y="427" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#BAE6FD">FPGCL inference</text>
  <text x="96" y="440" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#7DD3FC" opacity="0.85">embedding dot-product</text>

  <!-- T2: analyze_community (x=168..312) -->
  <rect x="168" y="394" width="144" height="54" rx="7" fill="url(#tl-g)" filter="url(#sh2)"/>
  <text x="240" y="412" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700" fill="white">analyze_community</text>
  <text x="240" y="427" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#BAE6FD">community detection</text>
  <text x="240" y="440" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#7DD3FC" opacity="0.85">members · leaders</text>

  <!-- T3: search_author + get_network_stats (x=408..552) -->
  <rect x="408" y="394" width="144" height="54" rx="7" fill="url(#tl-g)" filter="url(#sh2)"/>
  <text x="480" y="410" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700" fill="white">search_author</text>
  <text x="480" y="425" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8.5" fill="#BAE6FD">get_network_stats</text>
  <text x="480" y="440" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#7DD3FC" opacity="0.85">graph queries · stats</text>

  <!-- T4: search_knowledge / RAG (x=600..744) -->
  <rect x="600" y="394" width="144" height="54" rx="7" fill="url(#tl-g)" filter="url(#sh2)"/>
  <text x="672" y="412" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700" fill="white">search_knowledge</text>
  <text x="672" y="427" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#BAE6FD">3-Stage RAG</text>
  <text x="672" y="440" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#7DD3FC" opacity="0.85">ChromaDB · BM25 · CE</text>

  <!-- T5: find_collab_path + get_collab_strength (x=792..936) -->
  <rect x="792" y="394" width="144" height="54" rx="7" fill="url(#tl-g)" filter="url(#sh2)"/>
  <text x="864" y="410" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9" font-weight="700" fill="white">find_collab_path</text>
  <text x="864" y="425" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8.5" fill="#BAE6FD">get_collab_strength</text>
  <text x="864" y="440" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" fill="#7DD3FC" opacity="0.85">BFS path · edge weight</text>

  <!-- ═══ Arrows: Tools → Data (all straight vertical) ═══ -->
  <!-- T1(96) → Embeddings(center=96) -->
  <line x1="96"  y1="448" x2="96"  y2="462" stroke="#64748B" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- T2(240) → GraphStats(center=366) — goes straight down into the GraphStats box which spans 168..744 -->
  <line x1="240" y1="448" x2="240" y2="462" stroke="#64748B" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- T3(480) → GraphStats -->
  <line x1="480" y1="448" x2="480" y2="462" stroke="#64748B" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- T4(672) → KnowledgeBase(center=672) — goes straight down -->
  <line x1="672" y1="448" x2="672" y2="462" stroke="#64748B" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- T5(864) → GraphStats -->
  <line x1="864" y1="448" x2="864" y2="462" stroke="#64748B" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ═══ DATA STORES ═══ -->
  <!-- Layout: Embeddings(24..168) | GraphStats(168..792, wide) | KnowledgeBase(792..936) -->
  <!-- But T4(672) should go to KnowledgeBase and T5(864) to GraphStats — this means they'd overlap -->
  <!-- Better: Embeddings(24..168) | GraphStats(168..600, 432 wide) | KnowledgeBase(600..744) | GraphStats2/EdgeData(792..936) -->
  <!-- Simplest: Make ONE wide GraphStats from 168 to 936, with KnowledgeBase overlaid? No. -->
  <!-- Correct grouping:
       T1 → Embeddings (under T1)
       T2,T3 → Graph Stats (under T2,T3)
       T4 → Knowledge Base (under T4)
       T5 → Graph Stats (same as T2,T3) — can't without diagonal
       Solution: T5 also has its own data box "Edge Data" or reuse Graph Stats label next to KB
  -->

  <!-- Embeddings: x=24..168 center=96 ✓ T1 goes straight down -->
  <rect x="24" y="464" width="144" height="48" rx="7" fill="url(#dt-g)" stroke="#334155" stroke-width="1" filter="url(#sh2)"/>
  <text x="96" y="483" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#E2E8F0">Embeddings</text>
  <text x="96" y="499" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#94A3B8">author · paper  (.pt)</text>

  <!-- Graph Stats: x=168..600 center=384, spans T2(240) and T3(480) ✓ both go straight down -->
  <rect x="168" y="464" width="432" height="48" rx="7" fill="url(#dt-g)" stroke="#334155" stroke-width="1" filter="url(#sh2)"/>
  <text x="384" y="483" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#E2E8F0">Graph Stats</text>
  <text x="384" y="499" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#94A3B8">author_meta · community_meta · edges.json</text>

  <!-- Knowledge Base: x=600..744 center=672 ✓ T4 goes straight down -->
  <rect x="600" y="464" width="144" height="48" rx="7" fill="url(#dt-g)" stroke="#334155" stroke-width="1" filter="url(#sh2)"/>
  <text x="672" y="483" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#E2E8F0">Knowledge Base</text>
  <text x="672" y="499" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#94A3B8">knowledge_base.json</text>

  <!-- Edge / Collab Data: x=792..936 center=864 ✓ T5 goes straight down -->
  <rect x="792" y="464" width="144" height="48" rx="7" fill="url(#dt-g)" stroke="#334155" stroke-width="1" filter="url(#sh2)"/>
  <text x="864" y="483" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#E2E8F0">Graph Stats</text>
  <text x="864" y="499" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#94A3B8">collab edges · weights</text>

  <!-- ═══ Footer branding ═══ -->
  <text x="480" y="570" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#94A3B8" letter-spacing="1.5">
    AcadVex  ·  Academic Collaboration AI Agent Platform
  </text>
</svg>
